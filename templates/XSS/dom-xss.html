<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM XSS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/xss.css') }}">
</head>
<body>
    <div id="layout"></div>
    <div class="content">
        <div class="form-container active">
            <div class="xss-page">
                <h2>DOM XSS</h2>
                <div class="photo-gallery">
                    <button data-image="1">Photo 1</button>
                    <button data-image="2">Photo 2</button>
                    <button data-image="3">Photo 3</button>
                </div>
                <div class="photo-output" id="output_photo"></div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/layout.js') }}"></script>
    <script>
        const outputElement = document.getElementById('output_photo');
        const buttons = document.querySelectorAll('.photo-gallery button');

        buttons.forEach(button => {
            button.addEventListener('click', function() {
                const imageNumber = this.dataset.image;
                window.location.hash = `image_${imageNumber}`;
            });
        });

        function updatePhoto() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                outputElement.innerHTML = `<img src="/static/images/${decodeURIComponent(hash)}.jpg" alt="Photo">`;
            }
        }

        window.addEventListener('hashchange', updatePhoto);
        updatePhoto();
    </script>
</body>
</html>
