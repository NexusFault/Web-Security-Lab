<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Security Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-banner">
        <h1>Web Security Labs</h1>
        <span class="subtitle">vulnerability testing</span>

    <div class="sidebar">
        <nav class="buttons">
            <button data-form="xss">XSS</button>
            <button data-form="csrf">CSRF</button>
            <button data-form="sql">SQL</button>
        </nav>
    </div>

    <div class="content">
        <div class="form-container" id="xss">
            <h2>XSS Testing</h2>
        </div>

        <div class="form-container" id="csrf">
            <h2>CSRF Testing</h2>
        </div>

        <div class="form-container" id="sql">
            <h2>SQL Injection</h2>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
