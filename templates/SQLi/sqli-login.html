<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLi Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sqli.css') }}">
</head>
<body>
    <div id="layout"></div>
    <div class="content">
        <div class="form-container active">
            <div class="sqli-page">
                <h2>SQLi Login</h2>
                <p class="hint">You have been given the username: <strong>admin</strong>. Your task is to use an SQL injection to display the message "Login successful!"</p>
                <form action="" method="POST" class="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input name="username" type="text" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input name="password" type="text" placeholder="Enter password">
                    </div>
                    <button type="submit">Login</button>
                    {% if success %}
                        <div class="result success">{{ success | safe }}</div>
                    {% endif %}
                    {% if error %}
                        <div class="result error">{{ error | safe }}</div>
                    {% endif %}
                    {% if both %}
                        <div class="result info">{{ both | safe }}</div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/layout.js') }}"></script>
</body>
</html>
